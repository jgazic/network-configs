---
name: Validate Network Configs

on:
  pull_request:
    paths:
      - "configs/**"
      - "schemas/**"
      - "templates/**"
      - "scripts/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Schema validation
        run: |
          python scripts/validate_schema.py schemas/vlans.json configs/site-nyc/vlans.yml
          python scripts/validate_schema.py schemas/vlans.json configs/site-lon/vlans.yml
          python scripts/validate_schema.py schemas/acls.json configs/site-nyc/acls.yml
          python scripts/validate_schema.py schemas/acls.json configs/site-lon/acls.yml

      - name: VLAN and ACL validators
        run: |
          python scripts/validate_vlans.py configs/site-nyc/vlans.yml configs/site-lon/vlans.yml
          python scripts/validate_acls.py configs/site-nyc/acls.yml configs/site-lon/acls.yml

      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Workflow finished with status: ${{ job.status }}'
            })
